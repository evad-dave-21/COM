<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chronicle" />
  <title>Chronicle</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=IBM+Plex+Mono:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1a1a1a;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --red: #cc2200;
      --green: #3a9e6a;
      --text: #ede8e0;
      --muted: #777;
      --dim: #3a3a3a;
      --faint: #1a1a1a;
      --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Special Elite', 'Georgia', serif;
      min-height: 100vh;
      overscroll-behavior: none;
      position: relative;
    }

    /* ── Animated bg ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(204,34,0,0.05) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
      pointer-events: none;
      z-index: 0;
      animation: scanlines 8s linear infinite;
    }

    @keyframes scanlines {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 0 0, 0 0, 0 100px; }
    }

    /* ── Bat silhouettes floating ── */
    .bats {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 120px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bat {
      position: absolute;
      font-size: 10px;
      opacity: 0.12;
      animation: batfly linear infinite;
      color: var(--text);
    }
    .bat:nth-child(1) { top: 15%; left: -5%; animation-duration: 18s; animation-delay: 0s; font-size: 8px; }
    .bat:nth-child(2) { top: 35%; left: -5%; animation-duration: 24s; animation-delay: 4s; font-size: 12px; }
    .bat:nth-child(3) { top: 20%; left: -5%; animation-duration: 20s; animation-delay: 9s; font-size: 7px; }
    .bat:nth-child(4) { top: 50%; left: -5%; animation-duration: 28s; animation-delay: 2s; font-size: 9px; }
    .bat:nth-child(5) { top: 10%; left: -5%; animation-duration: 15s; animation-delay: 14s; font-size: 11px; }

    @keyframes batfly {
      0%   { transform: translateX(0) translateY(0px) scaleX(1); opacity: 0; }
      5%   { opacity: 0.12; }
      48%  { transform: translateX(55vw) translateY(-12px) scaleX(1); }
      50%  { transform: translateX(55vw) translateY(-12px) scaleX(-1); }
      95%  { opacity: 0.12; }
      100% { transform: translateX(110vw) translateY(0px) scaleX(-1); opacity: 0; }
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      padding-top: max(env(safe-area-inset-top, 0px), 40px);
      padding-bottom: 20px;
      padding-left: 24px;
      padding-right: 24px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .header-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.7;
    }
    .header-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 4px;
      color: var(--text);
      line-height: 1;
      text-shadow: 0 0 30px rgba(201,168,76,0.2);
      position: relative;
    }
    .header-logo span {
      color: var(--gold);
    }
    .header-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ── Streak widget ── */
    .streak-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .streak-icon { font-size: 18px; }
    .streak-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .streak-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-left: auto;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.95);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    nav::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }
    nav button {
      flex: 1;
      padding: 14px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--dim);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      transition: color 0.2s, border-color 0.2s;
      position: relative;
    }
    nav button.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    nav button.active::before {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold);
    }

    /* ── Views ── */
    .view { padding: 24px 20px 120px; display: none; }
    .view.active { display: block; }

    /* ── Today hero widget ── */
    .today-hero {
      background: linear-gradient(135deg, #111 0%, #0a0a0a 100%);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .today-hero::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    }
    .hero-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .hero-pct {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1;
      color: var(--text);
      letter-spacing: 2px;
    }
    .hero-pct span { color: var(--gold); font-size: 28px; }
    .hero-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .hero-bar-wrap {
      margin-top: 14px;
      height: 3px;
      background: var(--faint);
      border-radius: 2px;
      overflow: hidden;
    }
    .hero-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .hero-bar::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .hero-bar.done {
      background: linear-gradient(90deg, var(--green), #5fd49a);
    }

    /* ── Progress bar ── */
    .progress-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
    }
    .progress-label { color: var(--muted); }
    .progress-count { color: var(--gold); }
    .progress-count.done { color: var(--green); }
    .progress-track {
      height: 3px;
      background: var(--faint);
      border-radius: 2px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      transition: width 0.5s ease;
    }
    .progress-fill.done { background: linear-gradient(90deg, var(--green), #5fd49a); }

    /* ── Task rows ── */
    .task-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      animation: fadeSlideIn 0.3s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-check {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid #2a2a2a;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: white;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .task-check::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green);
      transform: scale(0);
      border-radius: 3px;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .task-check.checked::before { transform: scale(1); }
    .task-check .check-icon { position: relative; z-index: 1; }
    .task-label {
      flex: 1;
      font-size: 14px;
      color: #c8c4bc;
      transition: all 0.3s;
      font-family: 'Special Elite', serif;
      line-height: 1.4;
    }
    .task-label.checked {
      color: #2e2e2e;
      text-decoration: line-through;
    }
    .task-remove {
      background: none;
      border: none;
      color: #222;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .task-remove:active { color: var(--red); }

    /* ── Not visited badge ── */
    .not-visited-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(204,34,0,0.06);
      border: 1px solid rgba(204,34,0,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .not-visited-badge .nv-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      flex-shrink: 0;
      animation: pulse-red 2s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--red); }
      50% { opacity: 0.5; box-shadow: 0 0 4px var(--red); }
    }
    .nv-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: rgba(204,34,0,0.7);
      letter-spacing: 1px;
      line-height: 1.5;
    }
    .nv-swahili {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      color: rgba(204,34,0,0.5);
      font-style: italic;
    }

    /* ── Add task ── */
    .add-task-btn {
      margin-top: 16px;
      width: 100%;
      background: none;
      border: 1px dashed #1e1e1e;
      border-radius: 8px;
      color: #2e2e2e;
      font-size: 11px;
      padding: 13px 18px;
      cursor: pointer;
      text-align: left;
      letter-spacing: 2px;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .add-task-btn:active { border-color: var(--gold); color: var(--gold); }

    .add-task-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .add-task-row input {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Special Elite', serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-task-row input:focus { border-color: var(--gold); }
    .add-task-row button {
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
    }

    .empty-msg {
      color: #2a2a2a;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.7;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 1px;
    }

    /* ── Section title ── */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
    }

    /* ── Calendar ── */
    #view-month { padding: 0 0 120px; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 12px;
    }
    .cal-nav button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 12px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }
    .cal-month-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 4px;
      color: var(--text);
    }
    .cal-days-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px;
    }
    .cal-days-header span {
      text-align: center;
      font-size: 9px;
      color: #333;
      letter-spacing: 1px;
      padding: 4px 0;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 4px 12px 12px;
    }
    .cal-cell {
      aspect-ratio: 1;
      border-radius: 6px;
      border: 1px solid transparent;
      background: #0d0d0d;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: all 0.15s;
      position: relative;
    }
    .cal-cell.today {
      border-color: rgba(201,168,76,0.4);
      background: rgba(201,168,76,0.04);
    }
    .cal-cell.selected {
      border-color: var(--gold);
      background: rgba(201,168,76,0.08);
    }
    .cal-cell.not-visited {
      border-color: rgba(204,34,0,0.2);
    }
    .cal-cell.empty { background: none; border-color: transparent; cursor: default; }
    .cal-cell span {
      font-size: 12px;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
    }
    .cal-cell.today span { color: var(--gold); font-weight: bold; }
    .cal-cell.selected span { color: var(--gold2); }
    .cal-mini-bar {
      width: 65%;
      height: 2px;
      border-radius: 2px;
      background: #1a1a1a;
      overflow: hidden;
    }
    .cal-mini-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gold);
    }
    .cal-mini-fill.done { background: var(--green); }
    .cal-cell .nv-dot-mini {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0.6;
    }

    /* ── Day panel ── */
    .day-panel {
      margin: 0 12px;
      background: #0d0d0d;
      border-radius: 10px;
      border: 1px solid rgba(201,168,76,0.1);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .day-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }
    .day-panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: var(--text);
      margin-bottom: 14px;
    }

    /* ── Settings ── */
    #view-settings { padding: 24px 20px 120px; }
    .settings-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .settings-desc {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.8;
      letter-spacing: 1px;
    }
    .default-task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .default-task-row span {
      font-size: 14px;
      color: #c8c4bc;
      font-family: 'Special Elite', serif;
    }

    /* ── Complete animation overlay ── */
    .complete-flash {
      position: fixed;
      inset: 0;
      background: rgba(58,158,106,0.08);
      pointer-events: none;
      opacity: 0;
      z-index: 100;
    }
    .complete-flash.show {
      animation: flashGreen 0.6s ease;
    }
    @keyframes flashGreen {
      0% { opacity: 0; }
      30% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Divider ── */
    .gold-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
      margin: 20px 0;
    }

  </style>
</head>
<body>

<!-- Bat animation -->
<div class="bats">
  <div class="bat">🦇</div>
  <div class="bat">🦇</div>
  <div class="bat">🦇</div>
  <div class="bat">🦇</div>
  <div class="bat">🦇</div>
</div>

<!-- Flash overlay -->
<div class="complete-flash" id="complete-flash"></div>

<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-eyebrow">Daily Chronicle</div>
    <div class="header-logo">Chronicle</div>
    <div class="header-date" id="header-date"></div>
    <div class="streak-bar" id="streak-bar">
      <span class="streak-icon">🔥</span>
      <span class="streak-text">Current Streak</span>
      <span class="streak-count" id="streak-count">0</span>
    </div>
  </div>

  <!-- Nav -->
  <nav>
    <button class="active" onclick="switchView('today')">Today</button>
    <button onclick="switchView('month')">Calendar</button>
    <button onclick="switchView('settings')">Tasks</button>
  </nav>

  <!-- Today View -->
  <div class="view active" id="view-today">
    <div id="today-hero" class="today-hero" style="display:none;">
      <div class="hero-label">Completion Rate</div>
      <div class="hero-pct" id="hero-pct">0<span>%</span></div>
      <div class="hero-sub" id="hero-sub"></div>
      <div class="hero-bar-wrap">
        <div class="hero-bar" id="hero-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="section-title">Today's Tasks</div>
    <div style="height:12px;"></div>
    <div id="today-tasks"></div>
  </div>

  <!-- Month View -->
  <div id="view-month" style="display:none;">
    <div class="cal-nav">
      <button onclick="shiftMonth(-1)">&#8249;</button>
      <span class="cal-month-label" id="cal-label"></span>
      <button onclick="shiftMonth(1)">&#8250;</button>
    </div>
    <div class="cal-days-header">
      <span>Sun</span><span>Mon</span><span>Tue</span>
      <span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="day-panel-wrap"></div>
  </div>

  <!-- Settings View -->
  <div id="view-settings" style="display:none;">
    <div class="settings-section-title">Default Tasks</div>
    <div class="settings-desc">These appear on every day automatically.</div>
    <div id="default-task-list"></div>
    <div class="add-task-row" style="margin-top:24px;">
      <input type="text" id="new-default-input" placeholder="New default task..." onkeydown="if(event.key==='Enter') addDefaultTask()" />
      <button onclick="addDefaultTask()">+</button>
    </div>
  </div>

</div>


<script>
  const STORAGE_KEY = 'minja_chronicles_v2';
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let state = { defaultTasks: [], completions: {}, customDayTasks: {}, visitedDays: {} };
  let calYear, calMonth, selectedDayKey = null;
  let currentView = 'today';

  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  // ── Storage ──────────────────────────────────────────────────────────────────

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state = { visitedDays: {}, ...parsed };
      }
    } catch(e) {}
  }


  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }


  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }


  function markVisited(key) {
    if (!state.visitedDays[key]) {
      state.visitedDays[key] = true;
      save();
    }
  }

  // ── Task helpers ─────────────────────────────────────────────────────────────

  function getTasksForDay(key) {
    const defaults = state.defaultTasks.map(t => ({...t, isDefault: true}));
    const custom = (state.customDayTasks[key] || []).map(t => ({...t, isDefault: false}));
    return [...defaults, ...custom];
  }


  function getDayProgress(key) {
    const tasks = getTasksForDay(key);
    if (!tasks.length) return null;
    const done = tasks.filter(t => state.completions[key]?.[t.id]).length;
    return { done, total: tasks.length };
  }


  function isNotVisited(key) {
    // Past days only (not today, not future)
    const [y, m, d] = key.split('-').map(Number);
    const cellDate = new Date(y, m - 1, d);
    const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    if (cellDate >= todayDate) return false;

    const visited = state.visitedDays[key];
    const prog = getDayProgress(key);
    const hasChecked = prog && prog.done > 0;
    return !visited && !hasChecked;
  }


  function getStreak() {
    let streak = 0;
    const d = new Date(today);
    // Don't count today in streak (it's ongoing)
    d.setDate(d.getDate() - 1);
    while (true) {
      const k = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      const prog = getDayProgress(k);
      const visited = state.visitedDays[k];
      if (!visited && (!prog || prog.done === 0)) break;
      streak++;
      d.setDate(d.getDate() - 1);
      if (streak > 365) break;
    }
    return streak;
  }



  function renderTaskList(container, dayKey, tasks, showAddBtn) {
    const completions = state.completions[dayKey] || {};
    const done = tasks.filter(t => completions[t.id]).length;
    const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
    const complete = pct === 100 && tasks.length > 0;
    const notVisited = isNotVisited(dayKey);

    let html = '';

    if (notVisited) {
      html += `
        <div class="not-visited-badge">
          <div class="nv-dot"></div>
          <div>
            <div class="nv-text">NOT VISITED · MISSED DAY</div>
            <div class="nv-swahili">Umezingua</div>
          </div>
        </div>
      `;
    }

    if (tasks.length > 0) {
      html += `
        <div class="progress-row">
          <span class="progress-label">Progress</span>
          <span class="progress-count ${complete ? 'done' : ''}">${done}/${tasks.length}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill ${complete ? 'done' : ''}" style="width:${pct}%"></div>
        </div>
      `;
    } else {
      html += `<div class="empty-msg">// No tasks for this day</div>`;
    }

    tasks.forEach(task => {
      const checked = !!completions[task.id];
      html += `
        <div class="task-row">
          <button class="task-check ${checked ? 'checked' : ''}" onclick="toggleTask('${dayKey}','${task.id}')">
            <span class="check-icon">${checked ? '✓' : ''}</span>
          </button>
          <span class="task-label ${checked ? 'checked' : ''}">${escHtml(task.label)}</span>
          ${!task.isDefault ? `<button class="task-remove" onclick="removeCustomTask('${dayKey}','${task.id}')">×</button>` : ''}
        </div>
      `;
    });

    if (showAddBtn) {
      const inputId = 'add-input-' + dayKey;
      const rowId = 'add-row-' + dayKey;
      const btnId = 'add-btn-' + dayKey;
      html += `
        <button class="add-task-btn" id="${btnId}" onclick="showAddRow('${dayKey}','${inputId}','${rowId}','${btnId}')">+ Add task for this day</button>
        <div class="add-task-row" id="${rowId}" style="display:none;">
          <input type="text" id="${inputId}" placeholder="Task name..."
            onkeydown="if(event.key==='Enter') addCustomTask('${dayKey}','${inputId}'); if(event.key==='Escape') hideAddRow('${inputId}','${rowId}','${btnId}')" />
          <button onclick="addCustomTask('${dayKey}','${inputId}')">+</button>
        </div>
      `;
    }

    container.innerHTML = html;
  }


  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── View switching ───────────────────────────────────────────────────────────

  function render() {
    document.getElementById('header-date').textContent =
      today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();

    // Streak
    const streak = getStreak();
    document.getElementById('streak-count').textContent = streak;

    if (currentView === 'today') {
      markVisited(todayKey);
      const tasks = getTasksForDay(todayKey);
      const completions = state.completions[todayKey] || {};
      const done = tasks.filter(t => completions[t.id]).length;
      const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
      const complete = pct === 100 && tasks.length > 0;

      const hero = document.getElementById('today-hero');
      if (tasks.length > 0) {
        hero.style.display = 'block';
        document.getElementById('hero-pct').innerHTML = `${pct}<span>%</span>`;
        document.getElementById('hero-sub').textContent = `${done} of ${tasks.length} tasks complete`;
        const bar = document.getElementById('hero-bar');
        bar.style.width = pct + '%';
        bar.className = 'hero-bar' + (complete ? ' done' : '');
      } else {
        hero.style.display = 'none';
      }

      renderTaskList(document.getElementById('today-tasks'), todayKey, tasks, true);
    }

    if (currentView === 'month') {
      document.getElementById('cal-label').textContent = `${MONTHS[calMonth]} ${calYear}`;

      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      let gridHtml = '';

      for (let i = 0; i < firstDay; i++) gridHtml += `<div class="cal-cell empty"></div>`;

      for (let d = 1; d <= daysInMonth; d++) {
        const key = dateKey(calYear, calMonth, d);
        const isTodayCell = (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear());
        const isSelected = key === selectedDayKey;
        const prog = getDayProgress(key);
        const notV = isNotVisited(key);

        let cls = 'cal-cell';
        if (isTodayCell) cls += ' today';
        if (isSelected) cls += ' selected';
        if (notV) cls += ' not-visited';

        let indicator = '';
        if (notV) {
          indicator = `<div class="nv-dot-mini"></div>`;
        } else if (prog) {
          const pct = prog.done / prog.total;
          indicator = `<div class="cal-mini-bar"><div class="cal-mini-fill ${pct===1?'done':''}" style="width:${Math.round(pct*100)}%"></div></div>`;
        }

        gridHtml += `
          <div class="${cls}" onclick="selectDay('${key}')">
            <span>${d}</span>
            ${indicator}
          </div>
        `;
      }

      document.getElementById('cal-grid').innerHTML = gridHtml;

      const panelWrap = document.getElementById('day-panel-wrap');
      if (selectedDayKey) {
        const parts = selectedDayKey.split('-');
        const y = parts[0], m = parseInt(parts[1])-1, d = parseInt(parts[2]);
        const tasks = getTasksForDay(selectedDayKey);
        panelWrap.innerHTML = `
          <div class="day-panel">
            <div class="day-panel-title">${MONTHS[m]} ${d}, ${y}</div>
            <div id="day-panel-tasks"></div>
          </div>
        `;
        renderTaskList(document.getElementById('day-panel-tasks'), selectedDayKey, tasks, true);
      } else {
        panelWrap.innerHTML = '';
      }
    }

    if (currentView === 'settings') {
      const list = document.getElementById('default-task-list');
      if (state.defaultTasks.length === 0) {
        list.innerHTML = '<div class="empty-msg">// No default tasks yet</div>';
      } else {
        list.innerHTML = state.defaultTasks.map(t => `
          <div class="default-task-row">
            <span>${escHtml(t.label)}</span>
            <button class="task-remove" onclick="removeDefaultTask('${t.id}')">×</button>
          </div>
        `).join('');
      }
    }
  }



  function toggleTask(dayKey, taskId) {
    if (!state.completions[dayKey]) state.completions[dayKey] = {};
    state.completions[dayKey][taskId] = !state.completions[dayKey][taskId];
    markVisited(dayKey);
    save();

    // Check if all done → flash
    const tasks = getTasksForDay(dayKey);
    const done = tasks.filter(t => state.completions[dayKey]?.[t.id]).length;
    if (done === tasks.length && tasks.length > 0) {
      document.getElementById('complete-flash').classList.remove('show');
      void document.getElementById('complete-flash').offsetWidth;
      document.getElementById('complete-flash').classList.add('show');
    }
    render();
  }


  function addDefaultTask() {
    const input = document.getElementById('new-default-input');
    const label = input.value.trim();
    if (!label) return;
    state.defaultTasks.push({ id: 'def_' + Date.now(), label });
    input.value = '';
    save();
    render();
  }


  function removeDefaultTask(id) {
    state.defaultTasks = state.defaultTasks.filter(t => t.id !== id);
    save(); render();
  }


  function addCustomTask(dayKey, inputId) {
    const input = document.getElementById(inputId);
    const label = input.value.trim();
    if (!label) return;
    if (!state.customDayTasks[dayKey]) state.customDayTasks[dayKey] = [];
    state.customDayTasks[dayKey].push({ id: 'cust_' + Date.now(), label });
    markVisited(dayKey);
    input.value = '';
    save(); render();
  }


  function removeCustomTask(dayKey, taskId) {
    if (!state.customDayTasks[dayKey]) return;
    state.customDayTasks[dayKey] = state.customDayTasks[dayKey].filter(t => t.id !== taskId);
    save(); render();
  }

  // ── Render helpers ───────────────────────────────────────────────────────────

  function showAddRow(dayKey, inputId, rowId, btnId) {
    document.getElementById(rowId).style.display = 'flex';
    document.getElementById(btnId).style.display = 'none';
    setTimeout(() => document.getElementById(inputId)?.focus(), 50);
  }


  function hideAddRow(inputId, rowId, btnId) {
    document.getElementById(rowId).style.display = 'none';
    document.getElementById(btnId).style.display = 'block';
    document.getElementById(inputId).value = '';
  }


  function switchView(view) {
    currentView = view;
    ['view-today','view-month','view-settings'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    const map = { today: 'view-today', month: 'view-month', settings: 'view-settings' };
    document.getElementById(map[view]).style.display = 'block';
    document.querySelectorAll('nav button')[['today','month','settings'].indexOf(view)].classList.add('active');
    render();
  }


  function shiftMonth(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    selectedDayKey = null;
    render();
  }

  // ── Main render ──────────────────────────────────────────────────────────────

  function selectDay(key) {
    selectedDayKey = selectedDayKey === key ? null : key;
    render();
  }


  // ── Init ─────────────────────────────────────────────────────────────────────

  // ── Init ─────────────────────────────────────────────────────────────────────
  load();
  calYear = today.getFullYear();
  calMonth = today.getMonth();
  markVisited(todayKey);
  render();


</script>
</body>
</html>
